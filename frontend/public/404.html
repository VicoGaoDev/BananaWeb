<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Loading...</title>
  <script>
    // 保留当前路由并加载 index.html，实现 SPA 刷新不404
    const currentUrl = new URL(window.location.href);
    const pathParts = currentUrl.pathname.split("/").filter(Boolean);
    const appBase = pathParts[0] === "80ai" ? "/80ai/" : "/";
    const restoredPath = `${currentUrl.pathname}${currentUrl.search}${currentUrl.hash}`;
    window.history.replaceState(null, null, restoredPath);

    fetch(`${appBase}index.html`)
      .then(res => res.text())
      .then(html => {
        document.write(html);
        document.close();
      });
  </script>
</head>
<body></body>
</html>
